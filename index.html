<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>La Pringles — Portal Jóvenes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, addDoc, collection,
    query, orderBy, limit, onSnapshot, serverTimestamp, updateDoc, deleteDoc, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbNlr9T-q9QHosYX2UMziLQ2Qrl_yrQP8",
    authDomain: "scout-pringles.firebaseapp.com",
    projectId: "scout-pringles",
    storageBucket: "scout-pringles.firebasestorage.app",
    messagingSenderId: "655976644512",
    appId: "1:655976644512:web:2666d2483351087b866ec5"
  };

  const RAMA_COLORES = {
    "Castores":   "#FF6B00",
    "Manada":     "#FFD600",
    "Scouts":     "#2E7D32",
    "Caminantes": "#1565C0",
    "Rovers":     "#B71C1C"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userProfile = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { showPantalla("pantalla-login"); return; }
    currentUser = user;
    const profileRef = doc(db, "perfiles", user.uid);
    const snap = await getDoc(profileRef);
    
    if (!snap.exists()) {
      await setDoc(profileRef, {
        nombre: user.displayName || "Usuario",
        nombreReal: user.displayName || "",
        email: user.email,
        fotoPerfil: user.photoURL || "",
        edad: "", rama: "", sector: ""
      });
    }
    userProfile = { ... (await getDoc(profileRef)).data(), uid: user.uid };
    renderApp();
  });

  window.loginConGoogle = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  };

  window.logout = () => signOut(auth).then(() => location.reload());

  function showPantalla(id) {
    document.querySelectorAll(".pantalla").forEach(p => p.style.display = "none");
    document.getElementById(id).style.display = "flex";
  }

  // Lógica de bordes (Dirigentes: Degradado 3 colores)
  function getBordeCSS(edad, rama) {
    if (parseInt(edad) > 21) {
      return "border: 3px solid transparent; background-image: linear-gradient(white, white), linear-gradient(135deg, #1a3a6b, #e6b800, #b01a1a); background-origin: border-box; background-clip: padding-box, border-box;";
    }
    const color = RAMA_COLORES[rama] || "#ccc";
    return `border: 3px solid ${color}; background-image: none;`;
  }

  function getSubnombre(edad, rama, sector) {
    if (parseInt(edad) > 21) return `Dirigente · ${sector || rama || 'General'}`;
    return rama || "Sin rama";
  }

  function renderApp() {
    showPantalla("pantalla-app");
    document.getElementById("nombre-header").textContent = userProfile.nombre;
    document.getElementById("subnombre-header").textContent = getSubnombre(userProfile.edad, userProfile.rama, userProfile.sector);
    const av = document.getElementById("avatar-header");
    av.src = userProfile.fotoPerfil;
    av.style = getBordeCSS(userProfile.edad, userProfile.rama);
    cargarMuro();
  }

  window.publicarPost = async () => {
    const texto = document.getElementById("muro-input").value.trim();
    if (!texto) return;
    await addDoc(collection(db, "muro"), {
      texto,
      nombre: userProfile.nombre,
      nombreReal: currentUser.displayName,
      foto: userProfile.fotoPerfil,
      uid: currentUser.uid,
      edad: userProfile.edad,
      rama: userProfile.rama,
      sector: userProfile.sector,
      fecha: serverTimestamp()
    });
    document.getElementById("muro-input").value = "";
  };

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="post-link">${url}</a>`);
  }

  function cargarMuro() {
    const q = query(collection(db, "muro"), orderBy("fecha", "desc"), limit(50));
    onSnapshot(q, snap => {
      const lista = document.getElementById("muro-lista");
      lista.innerHTML = "";
      snap.forEach(d => {
        const data = d.data();
        const borderStyle = getBordeCSS(data.edad, data.rama);
        const sub = getSubnombre(data.edad, data.rama, data.sector);
        
        const div = document.createElement("div");
        div.className = "post-card";
        div.innerHTML = `
          <img src="${data.foto}" class="post-avatar" style="${borderStyle}">
          <div class="post-body">
            <div class="post-header">
              <strong>${data.nombre}</strong> 
              <span style="color:gray; font-size:10px; margin-left:4px;">(${data.nombreReal})</span>
              <span class="post-rama-tag">${sub}</span>
            </div>
            <p class="post-texto">${linkify(data.texto)}</p>
          </div>`;
        lista.appendChild(div);
      });
    });
  }

  // --- PERFIL ---
  window.actualizarCamposPerfil = () => {
    const edad = parseInt(document.getElementById("perfil-edad").value);
    const selRama = document.getElementById("perfil-rama");
    const divSector = document.getElementById("grupo-sector");
    
    // Reset botón al detectar cambios
    const btn = document.getElementById("btn-guardar-perfil");
    btn.style.background = "var(--azul)";
    btn.style.cursor = "pointer";
    btn.textContent = "Guardar cambios";

    if (edad > 21) {
      selRama.value = "Dirigente";
      divSector.style.display = "block";
    } else {
      divSector.style.display = "none";
      if (edad >= 5 && edad <= 6) selRama.value = "Castores";
      else if (edad >= 7 && edad <= 10) selRama.value = "Manada";
      else if (edad >= 11 && edad <= 13) selRama.value = "Scouts";
      else if (edad >= 14 && edad <= 16) selRama.value = "Caminantes";
      else if (edad >= 17 && edad <= 21) selRama.value = "Rovers";
    }
  };

  window.guardarPerfil = async () => {
    const nombre = document.getElementById("perfil-nombre").value;
    const edad = document.getElementById("perfil-edad").value;
    const rama = document.getElementById("perfil-rama").value;
    const sector = document.getElementById("perfil-sector").value;

    const updates = { nombre, edad, rama, sector };
    await updateDoc(doc(db, "perfiles", currentUser.uid), updates);
    
    // Actualizar perfil local y UI
    userProfile = { ...userProfile, ...updates };
    
    const btn = document.getElementById("btn-guardar-perfil");
    btn.style.background = "#aaa";
    btn.style.cursor = "not-allowed";
    btn.textContent = "✅ Guardado";
    
    renderApp();
  };
</script>

<style>
  :root { --azul:#1a3a6b; --rojo:#b01a1a; --amarillo:#e6b800; --fondo:#f0f4ff; --radius:14px; }
  body { font-family:'Nunito', sans-serif; background:var(--fondo); margin:0; }
  .app-header { background:var(--azul); color:white; padding:12px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
  .header-redes { display:flex; gap:8px; margin-left:10px; }
  .header-redes a img { width:24px; height:24px; filter: brightness(0) invert(1); }
  
  .post-card { background:white; margin:10px; padding:12px; border-radius:var(--radius); display:flex; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .post-avatar { width:45px; height:45px; border-radius:50%; object-fit:cover; }
  .post-rama-tag { font-size:10px; background:#eee; padding:2px 6px; border-radius:6px; margin-left:auto; }
  .post-link { color: #2a5298; text-decoration: underline; font-weight: 600; }

  .perfil-card { background:white; padding:20px; margin:15px; border-radius:var(--radius); }
  .perfil-foto-actual { width:100px; height:100px; border-radius:50%; margin:0 auto 15px; display:block; }
  .form-group { margin-bottom:12px; }
  .form-group label { display:block; font-size:11px; font-weight:800; color:#555; }
  .form-group input, .form-group select { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-top:4px; }
  
  .btn-save { background:var(--azul); color:white; border:none; padding:12px; width:100%; border-radius:10px; font-weight:700; cursor:pointer; }
  .ramas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
  .rama-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border-top: 4px solid var(--azul); }
  .btn-open-folder { background: #4285F4; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<div id="pantalla-login" class="pantalla" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:var(--azul); color:white;">
  <h1>La Pringles</h1>
  <button onclick="loginConGoogle()" style="padding:12px 24px; border-radius:50px; border:none; cursor:pointer; font-weight:700;">Iniciar con Google</button>
</div>

<div id="pantalla-app" class="pantalla" style="display:none; flex-direction:column;">
  <header class="app-header">
    <img id="avatar-header" src="" style="width:35px; height:35px; border-radius:50%;">
    <div style="flex:1">
      <div id="nombre-header" style="font-size:14px; font-weight:800;"></div>
      <div id="subnombre-header" style="font-size:10px; opacity:0.8;"></div>
    </div>
    <div class="header-redes">
      <a href="https://www.instagram.com/gruposcoutpringles/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
      <a href="https://www.facebook.com/GrupoScoutPringles/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
      <a href="https://www.facebook.com/museoscoutpostiglione" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png"></a>
      <a href="https://www.youtube.com/@GrupoScoutCnel.JuanP.Pringles" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    </div>
  </header>

  <nav style="display:flex; background:white; border-bottom:1px solid #ddd;">
    <button onclick="document.querySelectorAll('.tab').forEach(t=>t.style.display='none'); document.getElementById('tab-playon').style.display='block'" style="flex:1; padding:15px; border:none; background:none; font-weight:800;">Playón</button>
    <button onclick="document.querySelectorAll('.tab').forEach(t=>t.style.display='none'); document.getElementById('tab-ramas').style.display='grid'" style="flex:1; padding:15px; border:none; background:none; font-weight:800;">Ramas</button>
    <button onclick="document.querySelectorAll('.tab').forEach(t=>t.style.display='none'); document.getElementById('tab-perfil').style.display='block'" style="flex:1; padding:15px; border:none; background:none; font-weight:800;">Perfil</button>
  </nav>

  <div id="tab-playon" class="tab">
    <div style="padding:15px; background:white; margin:10px; border-radius:12px;">
      <textarea id="muro-input" placeholder="¿Qué estás pensando?" style="width:100%; border:none; outline:none; resize:none;"></textarea>
      <button onclick="publicarPost()" style="background:var(--azul); color:white; border:none; padding:8px 16px; border-radius:8px; float:right;">Publicar</button>
      <div style="clear:both;"></div>
    </div>
    <div id="muro-lista"></div>
  </div>

  <div id="tab-ramas" class="tab ramas-grid" style="display:none;">
    <div class="rama-card">
      <strong>Castores</strong>
      <button class="btn-open-folder" onclick="window.open('https://drive.google.com/drive/folders/1JbbIe0s5emgTXT9dxR6hB0dVueomFqqN?usp=drive_link')">Abrir carpeta</button>
    </div>
    <div class="rama-card">
      <strong>Manada</strong>
      <button class="btn-open-folder" onclick="window.open('https://drive.google.com/drive/folders/1rV7tNy9tXC6d9beHmc1qoy7uWICW1J9r?usp=drive_link')">Abrir carpeta</button>
    </div>
    <div class="rama-card">
      <strong>Unidad Scout</strong>
      <button class="btn-open-folder" onclick="window.open('https://drive.google.com/drive/folders/14MdqK9uXgnI_PL23SsL-3WS4MoxvJc3x?usp=drive_link')">Abrir carpeta</button>
    </div>
    <div class="rama-card">
      <strong>Caminantes</strong>
      <button class="btn-open-folder" onclick="window.open('https://drive.google.com/drive/folders/1sv--8BPtb4pWkiBKFuLiNKdiFCwxC6-v?usp=drive_link')">Abrir carpeta</button>
    </div>
    <div class="rama-card">
      <strong>Rovers</strong>
      <button class="btn-open-folder" onclick="window.open('https://drive.google.com/drive/folders/1tVtsdsp6YFb9rWvSwqejQHDxBe5TWjwU?usp=drive_link')">Abrir carpeta</button>
    </div>
  </div>

  <div id="tab-perfil" class="tab" style="display:none;">
    <div class="perfil-card">
      <img id="perfil-foto-actual" src="" class="perfil-foto-actual">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" id="perfil-nombre" oninput="actualizarCamposPerfil()">
      </div>
      <div class="form-group">
        <label>Edad</label>
        <input type="number" id="perfil-edad" oninput="actualizarCamposPerfil()">
      </div>
      <div class="form-group">
        <label>Rama</label>
        <select id="perfil-rama" disabled>
          <option value="">Selecciona edad primero</option>
          <option value="Castores">Castores</option>
          <option value="Manada">Manada</option>
          <option value="Scouts">Unidad Scout</option>
          <option value="Caminantes">Caminantes</option>
          <option value="Rovers">Rovers</option>
          <option value="Dirigente">Dirigente</option>
        </select>
      </div>
      <div id="grupo-sector" class="form-group" style="display:none;">
        <label>Sector</label>
        <select id="perfil-sector" onchange="actualizarCamposPerfil()">
          <option value="General">General</option>
          <option value="Museo">Museo</option>
          <option value="Jefatura">Jefatura</option>
          <option value="Pañol">Pañol</option>
        </select>
      </div>
      <button id="btn-guardar-perfil" class="btn-save" onclick="guardarPerfil()">Guardar cambios</button>
      <button onclick="logout()" style="margin-top:20px; color:red; background:none; border:none; width:100%; cursor:pointer;">Cerrar Sesión</button>
    </div>
  </div>
</div>

</body>
</html>
